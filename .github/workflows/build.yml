name: Flutter Android Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Reconstruct and Clean
        run: |
          # حذف أي بقايا قديمة مسببة للخطأ
          rm -rf android
          flutter clean
          # إجبار النظام على استخدام الاسم الصحيح (حروف صغيرة)
          flutter create --project-name=c_master_elite .
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: c-master-app
          path: build/app/outputs/flutter-apk/app-release.apk
