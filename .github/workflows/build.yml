name: Flutter Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - uses: actions/checkout@v4

      # 2. إعداد جافا (الإصدار 17 هو الأكثر استقراراً الآن)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. إعداد فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # نسخة مستقرة تضمن عمل الأوامر
          channel: 'stable'

      # 4. تثبيت المكتبات (Packages)
      - name: Install dependencies
        run: flutter pub get

      # 5. الأمر السحري: إعادة بناء ملفات الأندرويد وتصاريح الإنترنت تلقائياً
      - name: Reconstruct Android Folder
        run: flutter create .

      # 6. بناء ملف الـ APK النهائي
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 7. رفع الملف الناتج لكي تستطيع تحميله من تبويب Actions
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: c-master-app
          path: build/app/outputs/flutter-apk/app-release.apk
