name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Full Reconstruction & Internet Fix (التطهير وفتح الإنترنت)
        run: |
          # 1. حذف المجلدات القديمة لضمان عدم وجود ملفات معطوبة
          rm -rf android
          rm -f pubspec.lock
          
          # 2. إنشاء مجلد أندرويد جديد بأحدث الأدوات (لحل مشكلة الأدوات القديمة)
          flutter create . --platforms android
          
          # 3. إضافة تصريح الإنترنت (لحل مشكلة فشل الاتصال بالسحاب)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          
          # 4. تحديث المكتبات
          flutter pub get

      - name: Build Final Protected APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tiger-Ultimate-Fix
          path: build/app/outputs/flutter-apk/app-release.apk
